<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h2>Crear Cuenta</h2>
      <p>Regístrese para acceder al ERP</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
  <label for="cedula">Cédula</label>
  <input id="cedula" type="text" formControlName="cedula" placeholder="Ej. 1754373825"
    [class.is-invalid]="registerForm.get('cedula')?.invalid && registerForm.get('cedula')?.touched">
  <div class="error-message" *ngIf="registerForm.get('cedula')?.invalid && registerForm.get('cedula')?.touched">
    <span>Ingrese una cédula válida (10 dígitos).</span>
  </div>
</div>

      <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input id="nombre" type="text" formControlName="nombre" placeholder="Ej. Juan Pérez"
          [class.is-invalid]="registerForm.get('nombre')?.invalid && registerForm.get('nombre')?.touched">
        <div class="error-message" *ngIf="registerForm.get('nombre')?.invalid && registerForm.get('nombre')?.touched">
          <span>El nombre es obligatorio (min. 3 caracteres).</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input id="email" type="email" formControlName="email" placeholder="usuario@institucion.com"
          [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
        <div class="error-message" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          <span>Ingrese un correo válido.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••"
          [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
        <div class="error-message" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          <span>Mínimo 6 caracteres.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="••••••••"
          [class.is-invalid]="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched">
        <div class="error-message" *ngIf="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched">
          <span *ngIf="registerForm.get('confirmPassword')?.errors?.['required']">Confirme su contraseña.</span>
          <span *ngIf="registerForm.get('confirmPassword')?.errors?.['passwordMismatch']">Las contraseñas no coinciden.</span>
        </div>
      </div>

      <div class="backend-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-submit" [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? 'Registrando...' : 'Registrarse' }}
      </button>

      <div class="register-link">
        ¿Ya tienes una cuenta? 
        <a routerLink="/login">Inicia sesión aquí</a>
      </div>

    </form>
  </div>
</div>
