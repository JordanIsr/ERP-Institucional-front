<div class="page">

    <div class="matricula-box">

        <div class="header-box">
            <h2>Módulo de Matrículas</h2>
            <p>Registro y gestión de matrículas estudiantiles</p>
        </div>

        <form>

            <div class="section-box">

                <h3>Información Personal</h3>

                <div class="form-grid">

                    <div class="input-box">
                        <label>Cédula</label>
                        <input type="text">
                    </div>

                    <div class="input-box">
                        <label>Nombres</label>
                        <input type="text">
                    </div>

                    <div class="input-box">
                        <label>Apellidos</label>
                        <input type="text">
                    </div>

                    <div class="input-box">
                        <label>Correo</label>
                        <input type="email">
                    </div>

                    <div class="input-box">
                        <label>Teléfono</label>
                        <input type="text">
                    </div>

                </div>

            </div>

            <div class="section-box">

                <h3>Información Académica</h3>

                <div class="form-grid">

                    <div class="input-box">
                        <label>Carrera</label>
                        <select>
                            <option>Sistemas</option>
                            <option>Administración</option>
                            <option>Contabilidad</option>
                        </select>
                    </div>

                    <div class="input-box">
                        <label>Periodo</label>
                        <input type="text">
                    </div>

                    <div class="input-box">
                        <label>Jornada</label>
                        <select>
                            <option>Matutina</option>
                            <option>Vespertina</option>
                            <option>Nocturna</option>
                        </select>
                    </div>

                </div>

            </div>

            <div class="section-box">

                <h3>Documentos</h3>

                <div class="upload-grid">

                    <div class="upload-box">
                        <label>Fotografía del estudiante</label>
                        <input type="file" accept="image/*">
                    </div>

                    <div class="upload-box">
                        <label>Certificado de no adeudar</label>
                        <input type="file" accept=".pdf">
                    </div>

                </div>

            </div>

            <div class="section-box">

                <h3>Estado</h3>

                <div class="input-box">
                    <select>
                        <option>PENDIENTE</option>
                        <option>APROBADA</option>
                        <option>ANULADA</option>
                    </select>
                </div>

            </div>

            <div class="buttons">

                <button type="button">
                    Registrar
                </button>

                <button type="button">
                    Actualizar
                </button>

                <button type="button">
                    Anular
                </button>

                <button type="button">
                    Buscar
                </button>

            </div>

        </form>

    </div>

</div>
