<div class="erp-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
  <img src="/assets/logo-yavirac.jpg" alt="Educación Superior Yavirac">
  <h3>ERP Institucional</h3>
</div>
    <nav class="sidebar-menu">
      <ul>
        <li routerLinkActive="active" *ngIf="esAdminOSecretariaOEstudianteOUsuario">
  <a routerLink="/dashboard"><i class="icon">📊</i> Dashboard</a>
</li>

<li routerLinkActive="active" *ngIf="esAdmin()">
  <a routerLink="/users"><i class="icon">👥</i> Usuarios</a>
</li>

<li routerLinkActive="active" *ngIf="esAdmin()">
  <a routerLink="/comprobantes-pendientes"><i class="icon">📄</i> Comprobantes Pendientes</a>
</li>

<li class="has-submenu" *ngIf="esSecretaria()">
  <a (click)="toggleMatriculas()" class="menu-parent">
    <i class="icon">📝</i> Matrículas
    <i class="icon-arrow" [class.rotated]="matriculasAbierto">▾</i>
  </a>
  <ul class="submenu" *ngIf="matriculasAbierto">
    <li routerLinkActive="active">
      <a routerLink="/matriculas/registrar">Matricular Estudiante</a>
    </li>
    <li routerLinkActive="active">
      <a routerLink="/matriculas/buscar-estudiantes">Buscar Estudiantes</a>
    </li>
  </ul>
</li>

<li routerLinkActive="active" *ngIf="esAdminOSecretariaOEstudiante()">
  <a routerLink="/historial-academico">Historial Académico</a>
</li>
<li routerLinkActive="active" *ngIf="esAdminOSecretariaOEstudianteOUsuario">
  <a routerLink="/gestion-academica"><i class="icon">⚙️</i> Gestión Académica</a>
</li>

<li routerLinkActive="active" *ngIf="esAdmin()">
  <a routerLink="/periodos-flujo"><i class="icon">🏛️</i> Periodos</a>
</li>

<li routerLinkActive="active" *ngIf="esAdminOSecretariaOEstudianteOUsuario">
  <a routerLink="/settings"><i class="icon">⚙️</i> Configuración</a>
</li>
      </ul>
    </nav>
  </aside>

  <div class="main-container">
    
    <header class="header">
      <div class="header-title">
        <span>Bienvenido</span>
      </div>
      <div class="header-user">
        <span class="username">{{ usuarioLogueado }}</span>
        <button (click)="logout()" class="btn-logout">Cerrar Sesión</button>
      </div>
    </header>

    <main class="content">
        
      <router-outlet></router-outlet>
      
    </main>

  </div>
</div>
